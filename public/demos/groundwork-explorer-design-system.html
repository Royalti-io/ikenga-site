<!doctype html>
<html lang="en" data-theme="A" data-mode="dark" data-density="comfortable">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>groundwork — plan explorer</title>

  <!-- ─────────────────────────────────────────────────────────────────────
       Ikenga artifact manifest. Sibling to board.html (id groundwork-board);
       this is the FILE EXPLORER for the whole plan folder — a left file-tree +
       right tabbed type-dispatched viewer. No engineInvoke: read/browse surface
       that routes via art.sendToActiveSession, never a fresh session. fallback
       dataTag points at `explorer-mock-data` so a fresh open shows real-looking
       content before `groundwork explorer` writes into the `explorer-data` fence.
       ────────────────────────────────────────────────────────────────────── -->
  <script type="application/json" id="ikenga-manifest">
  {
    "format": "ikenga-artifact", "formatVersion": "0.1",
    "id": "groundwork-explorer", "name": "groundwork plan explorer", "version": "1.0.0",
    "description": "File explorer + tabbed viewer for a groundwork plan folder. Left tree, right type-dispatched viewer (markdown / iframe / image / pdf / json / code). Reads explorer-data from a fenced JSON block; falls back to mock data if absent.",
    "license": "Apache-2.0", "icon": { "lucide": "folder-tree" },
    "capabilities": {},
    "fallback": { "mode": "mock", "dataTag": "explorer-mock-data", "banner": "No explorer-data fence — showing mock plan." },
    "pin":      { "suggested": true, "section": "Planning", "label": "Files" },
    "requires": { "ikenga": ">=0.4", "bridge": "^1.0" }
  }
  </script>

  <!-- ─── Live data (written by `groundwork explorer` inside fences) ─── -->
  <script type="application/json" id="explorer-data">
  <!-- groundwork:auto:start explorer-data -->
  null
  <!-- groundwork:auto:end explorer-data -->
  </script>

  <script type="application/json" id="explorer-meta">
  <!-- groundwork:auto:start explorer-meta -->
  { "title": "{{plan_title}}", "profile": "{{profile}}", "plan_folder": "{{plan_folder}}", "plan_slug": "{{plan_slug}}", "goal": "{{goal}}", "root_rel": "..", "refreshed": null }
  <!-- groundwork:auto:end explorer-meta -->
  </script>

  <!-- ─── Per-plan view config. Agents may hand-tune this block to shape the
       view for the plan at hand (default left mode, label, feature flags).
       The _shared base ships an empty object; profile overlays pre-populate it.
       Recognized keys: defaultMode ("tree"|"gallery"|"media"), railOpen (bool),
       designLightDark (bool), highlightPublish (bool), title (string). ─── -->
  <!-- PROFILE OVERLAY · design-system · derived from profiles/_shared/explorer/index.html.
       Regenerate from the base when the base changes; only this
       #explorer-overlay config block differs. Gallery-first: opens on the designs grid; design lock/maturity badges to the fore. -->
  <script type="application/json" id="explorer-overlay">
  { "defaultMode": "gallery", "railOpen": true }
  </script>

  <!-- ─── Mock data for standalone/preview rendering before the action runs ─── -->
  <script type="application/json" id="explorer-mock-data">
  {
    "plan": { "title": "Example plan — file explorer", "profile": "software", "goal": "Browse a groundwork plan folder", "slug": "example-plan" },
    "tree": [
      { "name": "00-README.md", "path": "00-README.md", "type": "markdown", "kind": "spine", "registered": true, "embedded": true, "size": 320,
        "content": "# Example plan\n\nThis is the **mock** explorer. Run `groundwork explorer` in a real plan folder to populate it.\n\n<!-- groundwork:auto:start status-block -->\n_Generated region — status block._\n<!-- groundwork:auto:end status-block -->\n\nHand-authored prose lives outside the fences.",
        "badges": { "drift": "in-sync", "fences": ["spine-index", "status-block"] } },
      { "name": "01-plan.md", "path": "01-plan.md", "type": "markdown", "kind": "spine", "registered": true, "embedded": true, "size": 210,
        "content": "# Plan\n\n- WP-01 — the first work package\n- WP-02 — the second\n\n## Risks\n\n- The mock has no real risks." },
      { "name": "05-tracking.md", "path": "05-tracking.md", "type": "markdown", "kind": "spine", "registered": true, "embedded": true, "size": 160,
        "content": "# Tracking\n\n| WP | status |\n|----|--------|\n| WP-01 | in_progress |\n| WP-02 | queued |" },
      { "name": "artifact", "path": "artifact", "type": "dir", "kind": "dir", "registered": true, "empty": false, "children": [
        { "name": "board.html", "path": "artifact/board.html", "type": "html-artifact", "kind": "artifact", "registered": true, "embedded": false, "size": 81000 }
      ] },
      { "name": "designs", "path": "designs", "type": "dir", "kind": "dir", "registered": true, "empty": false, "children": [
        { "name": "option-a.html", "path": "designs/option-a.html", "type": "design", "kind": "design", "registered": true, "embedded": false, "size": 12000,
          "badges": { "design": { "phase": "P1", "wp": "WP-01", "locked": true, "locked_in": "Round 2" } } }
      ] }
    ],
    "ids": {
      "WP-01": { "title": "First work package", "wave": 0, "status": "in_progress" },
      "WP-02": { "title": "Second work package", "wave": 1, "status": "queued" }
    },
    "designs": { "designs/option-a.html": { "phase": "P1", "wp": "WP-01", "locked": true, "locked_in": "Round 2" } },
    "subplans": {},
    "stats": { "files": 4, "dirs": 2, "embedded": 3, "referenced": 1, "embedded_bytes": 690, "truncated": [] }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Inter:wght@300..600&family=JetBrains+Mono:wght@400..500&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       @ikenga/tokens — copied verbatim from the board template so the explorer
       shares the canonical palette + the shell theme/mode/density handshake.
       ═════════════════════════════════════════════════════════════════════ */
    :root {
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px;
      --radius-xs: 3px; --radius-sm: 5px; --radius-md: 8px; --radius-lg: 12px;
      --radius-xl: 16px; --radius-pill: 999px;
      --font-display: 'Fraunces', ui-serif, Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, SF Mono, Menlo, monospace;
      --text-h1: 32px; --text-h2: 24px; --text-h3: 18px;
      --text-body-lg: 16px; --text-body: 14px; --text-body-sm: 13px;
      --text-caption: 12px; --text-micro: 11px;
      --motion-fast: 120ms; --motion-base: 180ms; --motion-slow: 260ms;
      --ease-calm: cubic-bezier(0.2, 0.6, 0.2, 1);
      --ease-decisive: cubic-bezier(0.4, 0, 0.2, 1);
      color-scheme: dark;
    }
    :root[data-density="compact"]     { --row-h: 28px; --row-pad-y: 5px;  --body-size: 13px; --body-lead: 1.4; --gap: 4px; }
    :root[data-density="comfortable"] { --row-h: 36px; --row-pad-y: 8px;  --body-size: 14px; --body-lead: 1.55; --gap: 8px; }
    :root[data-density="spacious"]    { --row-h: 44px; --row-pad-y: 11px; --body-size: 16px; --body-lead: 1.6; --gap: 12px; }

    [data-theme="A"][data-mode="dark"], :root[data-theme="A"]:not([data-mode]) {
      color-scheme: dark;
      --bg-base: hsl(28, 18%, 4%);    --bg-surface: hsl(28, 14%, 7%);
      --bg-raised: hsl(28, 11%, 11%); --bg-sunken: hsl(28, 22%, 2.5%);
      --fg: hsl(36, 28%, 90%); --fg-muted: hsl(32, 11%, 56%); --fg-faint: hsl(28, 9%, 36%);
      --border: hsl(28, 14%, 15%); --border-soft: hsl(28, 14%, 11%);
      --primary: hsl(20, 50%, 34%); --primary-fg: hsl(36, 30%, 92%); --primary-soft: hsl(20, 40%, 14%);
      --achievement: hsl(42, 78%, 54%); --achievement-soft: hsl(42, 48%, 18%);
      --danger: hsl(8, 68%, 46%); --danger-fg: hsl(0, 0%, 98%); --danger-soft: hsl(8, 50%, 16%);
      --systemic: hsl(170, 28%, 34%); --systemic-soft: hsl(170, 22%, 16%);
      --rule: hsl(28, 14%, 18%); --chip-carve: hsl(28, 14%, 32%);
      --shadow-1: 0 1px 2px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.25);
      --shadow-2: 0 4px 12px -2px rgba(0,0,0,.55);
      --shadow-3: 0 12px 28px -8px rgba(0,0,0,.6);
    }
    [data-theme="A"][data-mode="light"] {
      color-scheme: light;
      --bg-base: hsl(36, 22%, 96%);   --bg-surface: hsl(36, 18%, 93%);
      --bg-raised: hsl(36, 14%, 89%); --bg-sunken: hsl(36, 26%, 98%);
      --fg: hsl(28, 30%, 14%); --fg-muted: hsl(28, 14%, 38%); --fg-faint: hsl(28, 12%, 56%);
      --border: hsl(32, 16%, 78%); --border-soft: hsl(32, 16%, 84%);
      --primary: hsl(20, 50%, 34%); --primary-fg: hsl(36, 26%, 98%); --primary-soft: hsl(20, 50%, 90%);
      --achievement: hsl(42, 78%, 42%); --achievement-soft: hsl(42, 60%, 90%);
      --danger: hsl(8, 68%, 42%); --danger-fg: hsl(0, 0%, 98%); --danger-soft: hsl(8, 60%, 92%);
      --systemic: hsl(170, 36%, 32%); --systemic-soft: hsl(170, 30%, 90%);
      --rule: hsl(36, 14%, 84%); --chip-carve: hsl(28, 14%, 62%);
      --shadow-1: 0 1px 2px rgba(28,18,8,.08);
      --shadow-2: 0 4px 12px -2px rgba(28,18,8,.10);
      --shadow-3: 0 12px 28px -8px rgba(28,18,8,.14);
    }
    [data-theme="B"][data-mode="light"], :root[data-theme="B"]:not([data-mode]) {
      color-scheme: light;
      --bg-base: hsl(36, 28%, 96%);   --bg-surface: hsl(36, 22%, 94%);
      --bg-raised: hsl(36, 18%, 90%); --bg-sunken: hsl(36, 32%, 98%);
      --fg: hsl(28, 30%, 12%); --fg-muted: hsl(28, 14%, 38%); --fg-faint: hsl(28, 12%, 56%);
      --border: hsl(32, 18%, 80%); --border-soft: hsl(32, 18%, 86%);
      --primary: hsl(42, 82%, 46%); --primary-fg: hsl(28, 30%, 8%); --primary-soft: hsl(42, 60%, 88%);
      --achievement: hsl(14, 72%, 46%); --achievement-soft: hsl(14, 60%, 90%);
      --danger: hsl(8, 68%, 42%); --danger-fg: hsl(0, 0%, 98%); --danger-soft: hsl(8, 60%, 92%);
      --systemic: hsl(170, 36%, 32%); --systemic-soft: hsl(170, 30%, 90%);
      --rule: hsl(36, 14%, 84%); --chip-carve: hsl(28, 14%, 62%);
      --shadow-1: 0 1px 2px rgba(28,18,8,.08);
      --shadow-2: 0 4px 12px -2px rgba(28,18,8,.10);
      --shadow-3: 0 12px 28px -8px rgba(28,18,8,.14);
    }
    [data-theme="B"][data-mode="dark"] {
      color-scheme: dark;
      --bg-base: hsl(36, 12%, 8%);    --bg-surface: hsl(36, 10%, 12%);
      --bg-raised: hsl(36, 8%, 16%);  --bg-sunken: hsl(36, 16%, 6%);
      --fg: hsl(40, 28%, 92%); --fg-muted: hsl(36, 10%, 62%); --fg-faint: hsl(36, 8%, 42%);
      --border: hsl(36, 12%, 22%); --border-soft: hsl(36, 12%, 18%);
      --primary: hsl(42, 84%, 60%); --primary-fg: hsl(36, 30%, 8%); --primary-soft: hsl(42, 60%, 18%);
      --achievement: hsl(14, 76%, 56%); --achievement-soft: hsl(14, 50%, 18%);
      --danger: hsl(8, 70%, 52%); --danger-fg: hsl(0, 0%, 98%); --danger-soft: hsl(8, 50%, 18%);
      --systemic: hsl(170, 32%, 46%); --systemic-soft: hsl(170, 25%, 18%);
      --rule: hsl(36, 12%, 22%); --chip-carve: hsl(36, 12%, 38%);
      --shadow-1: 0 1px 2px rgba(0,0,0,.55);
      --shadow-2: 0 4px 12px -2px rgba(0,0,0,.55);
      --shadow-3: 0 12px 28px -8px rgba(0,0,0,.6);
    }
    [data-theme="C"][data-mode="dark"], :root[data-theme="C"]:not([data-mode]) {
      color-scheme: dark;
      --bg-base: hsl(180, 14%, 7%);   --bg-surface: hsl(180, 12%, 11%);
      --bg-raised: hsl(180, 10%, 15%);--bg-sunken: hsl(180, 18%, 5%);
      --fg: hsl(40, 18%, 90%); --fg-muted: hsl(180, 8%, 60%); --fg-faint: hsl(180, 8%, 42%);
      --border: hsl(180, 12%, 22%); --border-soft: hsl(180, 12%, 18%);
      --primary: hsl(170, 35%, 50%); --primary-fg: hsl(180, 18%, 6%); --primary-soft: hsl(170, 30%, 18%);
      --achievement: hsl(40, 58%, 64%); --achievement-soft: hsl(40, 30%, 18%);
      --danger: hsl(8, 70%, 50%); --danger-fg: hsl(0, 0%, 98%); --danger-soft: hsl(8, 50%, 18%);
      --systemic: hsl(220, 22%, 56%); --systemic-soft: hsl(220, 14%, 18%);
      --rule: hsl(180, 12%, 22%); --chip-carve: hsl(180, 12%, 38%);
      --shadow-1: 0 1px 2px rgba(0,0,0,.6);
      --shadow-2: 0 4px 12px -2px rgba(0,0,0,.6);
      --shadow-3: 0 12px 28px -8px rgba(0,0,0,.65);
    }
    [data-theme="C"][data-mode="light"] {
      color-scheme: light;
      --bg-base: hsl(180, 10%, 95%);  --bg-surface: hsl(180, 8%, 92%);
      --bg-raised: hsl(180, 6%, 88%); --bg-sunken: hsl(180, 12%, 97%);
      --fg: hsl(200, 22%, 14%); --fg-muted: hsl(200, 10%, 38%); --fg-faint: hsl(200, 8%, 58%);
      --border: hsl(180, 12%, 80%); --border-soft: hsl(180, 12%, 86%);
      --primary: hsl(170, 42%, 34%); --primary-fg: hsl(180, 12%, 97%); --primary-soft: hsl(170, 30%, 88%);
      --achievement: hsl(40, 64%, 38%); --achievement-soft: hsl(40, 50%, 90%);
      --danger: hsl(8, 70%, 42%); --danger-fg: hsl(0, 0%, 98%); --danger-soft: hsl(8, 60%, 92%);
      --systemic: hsl(220, 24%, 40%); --systemic-soft: hsl(220, 22%, 90%);
      --rule: hsl(180, 12%, 80%); --chip-carve: hsl(200, 8%, 58%);
      --shadow-1: 0 1px 2px rgba(20,28,32,.08);
      --shadow-2: 0 4px 12px -2px rgba(20,28,32,.10);
      --shadow-3: 0 12px 28px -8px rgba(20,28,32,.14);
    }

    /* ═════════════════════════════ Explorer chrome ═════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-base); }
    body {
      font-family: var(--font-body); font-size: var(--body-size, var(--text-body)); line-height: var(--body-lead, 1.55);
      color: var(--fg); -webkit-font-smoothing: antialiased;
      transition: background var(--motion-slow) var(--ease-calm), color var(--motion-slow) var(--ease-calm);
    }
    button { font-family: inherit; }
    .mono { font-family: var(--font-mono); }

    /* The load-bearing clamp: a single full-height flex column that never page-
       scrolls, so the sidebar + viewer scroll independently (cross-browser,
       WebKitGTK included). Copied intent from the board's .shell. */
    .shell { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      border-bottom: 1px solid var(--border-soft); background: var(--bg-surface);
      flex-shrink: 0;
    }
    .topbar-titles { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .topbar-eyebrow {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--fg-faint); display: inline-flex; align-items: center; gap: 6px;
    }
    .topbar-eyebrow .dot-tint { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
    .topbar-title {
      font-family: var(--font-display); font-weight: 500; font-size: clamp(15px, 1.4vw, 19px);
      letter-spacing: -.01em; color: var(--fg); margin: 0; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52vw;
    }
    .topbar-spacer { flex: 1; }
    .topbar-actions { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }

    .seg { display: inline-flex; background: var(--bg-base); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 2px; gap: 2px; }
    .seg button {
      font-size: var(--text-micro); font-weight: 500; padding: 3px 9px; border-radius: var(--radius-sm);
      border: 0; background: transparent; color: var(--fg-muted); cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .seg button:hover { color: var(--fg); }
    .seg button.is-on { background: var(--bg-raised); color: var(--fg); box-shadow: var(--shadow-1); }
    .seg button.is-on svg { color: var(--primary); }
    .seg svg { width: 13px; height: 13px; opacity: .8; }

    .iconbtn {
      width: 30px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg-base); border: 1px solid var(--border-soft); color: var(--fg-muted);
      border-radius: var(--radius-sm); cursor: pointer; transition: border-color var(--motion-fast) var(--ease-calm), color var(--motion-fast) var(--ease-calm);
    }
    .iconbtn:hover { border-color: var(--primary); color: var(--fg); }
    .iconbtn.is-on { border-color: var(--primary); color: var(--primary); }
    .iconbtn svg { width: 15px; height: 15px; }

    .host-badge {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      padding: 3px 8px; border-radius: var(--radius-pill);
      background: var(--bg-base); border: 1px solid var(--border-soft); color: var(--fg-faint);
    }
    .host-badge.in-shell { background: var(--systemic-soft); border-color: var(--systemic); color: var(--systemic); }
    .host-badge.mock { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }

    /* Workspace grid: sidebar | main | (optional) rail */
    .workspace { flex: 1; display: grid; grid-template-columns: var(--sidebar-w, 296px) 1fr; min-height: 0; min-width: 0; }
    .workspace.with-rail { grid-template-columns: var(--sidebar-w, 296px) 1fr var(--rail-w, 300px); }

    /* Sidebar */
    .sidebar { border-right: 1px solid var(--border-soft); background: var(--bg-surface); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .sidebar-head { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; gap: var(--space-2); }
    .sidebar-head .seg { flex: 1; }
    .sidebar-head .seg button { flex: 1; justify-content: center; }
    .sidebar-stats { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); padding: 4px var(--space-3); border-bottom: 1px solid var(--border-soft); letter-spacing: .03em; }
    .sidebar-body { flex: 1; overflow: auto; padding: var(--space-2) var(--space-1) var(--space-4); }

    /* Search */
    .search { padding: var(--space-2) var(--space-3) 0; }
    .search-box { display: flex; align-items: center; gap: 6px; background: var(--bg-base); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); padding: 5px 8px; }
    .search-box:focus-within { border-color: var(--primary); }
    .search-box svg { color: var(--fg-faint); flex-shrink: 0; }
    .search-box input { flex: 1; min-width: 0; border: 0; background: transparent; outline: 0; color: var(--fg); font-size: var(--text-body-sm); font-family: inherit; }
    .search-box input::placeholder { color: var(--fg-faint); }
    .search-clear { color: var(--fg-faint); cursor: pointer; display: inline-flex; flex-shrink: 0; }
    .search-clear:hover { color: var(--fg); }
    .search-kbd { font-family: var(--font-mono); font-size: 9px; color: var(--fg-faint); border: 1px solid var(--border-soft); border-radius: var(--radius-xs); padding: 1px 5px; flex-shrink: 0; }
    .results { padding: var(--space-2) var(--space-1); }
    .results-head { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-faint); padding: 4px 8px var(--space-2); }
    .result { display: block; width: 100%; text-align: left; border: 0; background: transparent; cursor: pointer; border-radius: var(--radius-sm); padding: 6px 8px; color: var(--fg); }
    .result:hover { background: var(--bg-raised); }
    .result.is-active { background: var(--primary-soft); box-shadow: inset 2px 0 0 var(--primary); }
    .result-name { display: flex; align-items: center; gap: 6px; font-size: var(--text-body-sm); }
    .result-name .tree-icon { width: 14px; }
    .result-name .rn-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-path { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-faint); margin: 2px 0 0 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-snip { font-size: 11px; color: var(--fg-muted); margin: 3px 0 0 20px; line-height: 1.4; max-height: 2.9em; overflow: hidden; }
    .result-snip mark, .result-name mark { background: var(--achievement-soft); color: var(--achievement); border-radius: 2px; padding: 0 1px; }
    .result-badge { margin-left: auto; font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .04em; text-transform: uppercase; color: var(--fg-faint); border: 1px solid var(--border-soft); border-radius: var(--radius-xs); padding: 0 4px; flex-shrink: 0; }
    .results-empty { padding: var(--space-5) var(--space-4); text-align: center; color: var(--fg-faint); font-size: var(--text-body-sm); }

    /* Tree */
    .tree-node { user-select: none; }
    .tree-row {
      display: flex; align-items: center; gap: 6px; width: 100%;
      padding: 3px 6px; border: 0; background: transparent; color: var(--fg); cursor: pointer;
      border-radius: var(--radius-sm); text-align: left; font-size: var(--text-body-sm); line-height: 1.3;
      transition: background var(--motion-fast) var(--ease-calm);
    }
    .tree-row:hover { background: var(--bg-raised); }
    .tree-row.is-active { background: var(--primary-soft); box-shadow: inset 2px 0 0 var(--primary); }
